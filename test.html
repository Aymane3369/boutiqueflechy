<!DOCTYPE html>
<html>
<head>
    <title>Test Supabase</title>
</head>
<body>
    <h1>Test de connexion</h1>
    <div id="result">Chargement...</div>

    <script>
        const SUPABASE_URL = 'https://xrocqhazpmjcnqjdyytd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhyb2NxaGF6cG1qY25xamR5eXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjEwOTMsImV4cCI6MjA5NzEzNzA5M30.he8Gqs2h57Sq-knzKCr_C7BmZGHg76knhm0e3Y5EvF0';

        async function test() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (!response.ok) {
                    document.getElementById('result').innerHTML = `❌ HTTP ${response.status}: ${await response.text()}`;
                    return;
                }
                const data = await response.json();
                document.getElementById('result').innerHTML = `✅ ${data.length} produits trouvés !`;
                console.log('Produits:', data);
            } catch(e) {
                document.getElementById('result').innerHTML = `❌ Exception: ${e.message}`;
                console.error(e);
            }
        }
        test();
    </script>
</body>
</html>
