<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleShop - Boutique</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* (mêmes styles que précédemment, je les raccourcis pour lisibilité) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body { background: #f8fafc; }
        .header { background: white; border-bottom: 1px solid #e2e8f0; padding: 1rem 2rem; display: flex; justify-content: space-between; }
        .logo { font-size: 1.6rem; font-weight: 700; cursor: pointer; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.8rem; }
        .cart-count { position: absolute; top: -8px; right: -12px; background: #3b82f6; color: white; border-radius: 30px; padding: 2px 6px; font-size: 0.7rem; }
        .container { max-width: 1300px; margin: 0 auto; padding: 2rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem; margin-top: 1.5rem; }
        .product-card { background: white; border-radius: 24px; padding: 1.2rem; cursor: pointer; border: 1px solid #e2e8f0; }
        .product-icon { font-size: 3rem; }
        .product-title { font-size: 1.2rem; font-weight: 600; }
        .product-price { font-weight: 700; margin-top: 0.5rem; }
        .product-detail { background: white; border-radius: 32px; padding: 2rem; max-width: 700px; margin: 0 auto; }
        .variant-options { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .variant-btn { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 0.5rem 1rem; border-radius: 40px; cursor: pointer; }
        .variant-btn.selected { background: #0f172a; color: white; }
        .cart-page { background: white; border-radius: 32px; padding: 1.5rem; }
        .cart-item { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid #e2e8f0; }
        .qty-btn { background: #e2e8f0; padding: 0.2rem 0.6rem; border-radius: 20px; }
        .promo-box { background: #f8fafc; padding: 1rem; border-radius: 20px; margin-top: 1rem; display: flex; gap: 0.5rem; }
        button { background: #0f172a; color: white; padding: 0.6rem 1.2rem; border-radius: 40px; border: none; cursor: pointer; }
        button.primary { background: #3b82f6; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #0f172a; color: white; padding: 0.8rem 1.5rem; border-radius: 40px; z-index: 200; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 32px; padding: 1.8rem; max-width: 500px; width: 90%; }
    </style>
</head>
<body>
<div class="header">
    <div class="logo" onclick="navigateTo('catalogue')">StyleShop</div>
    <div class="cart-icon" onclick="navigateTo('cart')">🛒 <span id="cartCount" class="cart-count">0</span></div>
</div>
<div id="app" class="container"></div>

<script>
    // --- Configuration Supabase ---
    const SUPABASE_URL = 'https://xrocqhazpmjcnqjdyytd.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhyb2NxaGF6cG1qY25xamR5eXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NjEwOTMsImV4cCI6MjA5NzEzNzA5M30.he8Gqs2h57Sq-knzKCr_C7BmZGHg76knhm0e3Y5EvF0';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- Variables globales ---
    let products = [];
    let promos = [];
    let cart = [];
    let appliedPromo = null;

    // --- Fonctions de chargement depuis Supabase ---
    async function loadProducts() {
        const { data, error } = await supabase.from('products').select('*');
        if (!error && data) products = data;
        else console.error(error);
    }

    async function loadPromos() {
        const { data, error } = await supabase.from('promos').select('*');
        if (!error && data) promos = data;
    }

    async function loadCart() {
        const stored = localStorage.getItem('styleShopCart');
        if (stored) cart = JSON.parse(stored);
        updateCartCount();
    }

    function saveCart() {
        localStorage.setItem('styleShopCart', JSON.stringify(cart));
        updateCartCount();
    }

    function updateCartCount() {
        const total = cart.reduce((s, i) => s + i.quantity, 0);
        const span = document.getElementById('cartCount');
        if (span) span.innerText = total;
    }

    // --- Utilitaires ---
    function getStock(productId, variantId) {
        const prod = products.find(p => p.id === productId);
        if (!prod) return 0;
        if (prod.type === 'simple') return prod.stock || 0;
        const variant = prod.variants?.find(v => v.id === variantId);
        return variant ? variant.stock : 0;
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // --- Panier ---
    async function addToCart(productId, variantId, quantity = 1) {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        let available = 0, price = 0, attributes = {};
        if (product.type === 'simple') {
            available = product.stock || 0;
            price = product.price;
        } else {
            const variant = product.variants?.find(v => v.id === variantId);
            if (!variant) return;
            available = variant.stock;
            price = variant.price;
            attributes = variant.attributes;
        }
        if (available < quantity) { showToast(`Stock insuffisant (${available})`); return; }
        const existing = cart.find(i => i.productId === productId && i.variantId === variantId);
        if (existing) {
            const newQty = existing.quantity + quantity;
            if (newQty > available) { showToast(`Max ${available}`); return; }
            existing.quantity = newQty;
        } else {
            cart.push({ productId, variantId, name: product.name, price, quantity, attributes, icon: product.icon });
        }
        saveCart();
        showToast(`Ajouté : ${product.name}`);
        if (currentPage === 'cart') renderCart();
    }

    async function updateCartItem(index, newQuantity) {
        if (newQuantity <= 0) {
            cart.splice(index, 1);
            saveCart();
            renderCurrentPage();
            return;
        }
        const item = cart[index];
        const stock = getStock(item.productId, item.variantId);
        if (newQuantity > stock) { showToast(`Stock max ${stock}`); return; }
        item.quantity = newQuantity;
        saveCart();
        renderCurrentPage();
    }

    function getSubtotal() { return cart.reduce((s, i) => s + (i.price * i.quantity), 0); }

    function applyPromoCode(code) {
        const promo = promos.find(p => p.code === code && p.active);
        if (!promo) return { success: false, message: 'Code invalide' };
        const subtotal = getSubtotal();
        let discount = promo.type === 'fixed' ? Math.min(promo.value, subtotal) : subtotal * promo.value / 100;
        discount = parseFloat(discount.toFixed(2));
        appliedPromo = { code: promo.code, type: promo.type, value: promo.value, discountAmount: discount };
        return { success: true, message: `-${discount}€ appliqué` };
    }

    function removePromo() { appliedPromo = null; }
    function getTotal() { return getSubtotal() - (appliedPromo?.discountAmount || 0); }

    // --- Simulation paiement + mise à jour stock Supabase ---
    async function simulateCheckout(total) {
        if (cart.length === 0) return;
        // Vérifier stocks
        for (const item of cart) {
            const stock = getStock(item.productId, item.variantId);
            if (item.quantity > stock) { showToast(`Stock dépassé pour ${item.name}`); return; }
        }
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div class="modal-content"><h3>Paiement sécurisé</h3><p>Total : ${total.toFixed(2)} €</p><div style="display:flex;gap:1rem;justify-content:flex-end;"><button id="cancelPay" class="outline">Annuler</button><button id="confirmPay" class="primary">Payer</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('cancelPay').onclick = () => modal.remove();
        document.getElementById('confirmPay').onclick = async () => {
            modal.remove();
            // 1. Mettre à jour les stocks dans Supabase
            for (const item of cart) {
                const prod = products.find(p => p.id === item.productId);
                if (prod.type === 'simple') {
                    const newStock = (prod.stock || 0) - item.quantity;
                    await supabase.from('products').update({ stock: newStock }).eq('id', prod.id);
                } else {
                    const variant = prod.variants.find(v => v.id === item.variantId);
                    if (variant) {
                        variant.stock -= item.quantity;
                        await supabase.from('products').update({ variants: prod.variants }).eq('id', prod.id);
                    }
                }
            }
            // 2. Créer la commande
            const orderId = 'ORD-' + Math.random().toString(36).substring(2,8).toUpperCase();
            const now = new Date();
            const order = {
                id: orderId,
                client: `client${Math.floor(Math.random()*1000)}@email.com`,
                date: now.toISOString().slice(0,10),
                time: now.toLocaleTimeString('fr-FR'),
                items: cart.map(i => ({ productId: i.productId, variantId: i.variantId, qty: i.quantity, price: i.price })),
                total: total,
                status: 'Payée',
                admin_followup: 'À traiter',
                promo_code: appliedPromo?.code || null,
                discount: appliedPromo?.discountAmount || 0
            };
            await supabase.from('orders').insert(order);
            // 3. Vider panier et promo
            cart = [];
            appliedPromo = null;
            saveCart();
            showToast(`Commande ${orderId} confirmée !`);
            // 4. Recharger les produits pour avoir les stocks à jour
            await loadProducts();
            renderConfirmation(orderId, total);
        };
    }

    function renderConfirmation(orderId, total) {
        const html = `<div style="background:white;border-radius:32px;padding:2rem;text-align:center;"><h2>✅ Commande confirmée !</h2><p>N° ${orderId}</p><p>Total payé : ${total.toFixed(2)} €</p><button class="primary" onclick="navigateTo('catalogue')">Nouvelle commande</button></div>`;
        document.getElementById('app').innerHTML = html;
    }

    // --- Navigation et rendu ---
    let currentPage = 'catalogue';
    let selectedProductId = null;
    let selectedVariantCache = {};

    async function navigateTo(page, productId = null) {
        if (page === 'product' && productId) {
            currentPage = 'product';
            selectedProductId = productId;
            const prod = products.find(p => p.id === productId);
            if (prod && prod.type === 'variants' && !selectedVariantCache[productId]) {
                const firstAvail = prod.variants?.find(v => v.stock > 0);
                selectedVariantCache[productId] = firstAvail ? firstAvail.id : null;
            }
        } else if (page === 'cart') {
            currentPage = 'cart';
        } else {
            currentPage = 'catalogue';
            selectedProductId = null;
        }
        renderCurrentPage();
    }

    async function renderCurrentPage() {
        if (currentPage === 'catalogue') renderCatalogue();
        else if (currentPage === 'product' && selectedProductId) renderProductDetail(selectedProductId);
        else if (currentPage === 'cart') renderCart();
        else renderCatalogue();
    }

    function renderCatalogue() {
        const html = `<h1>Catalogue</h1><div class="products-grid">${products.filter(p => p.active !== false).map(p => `
            <div class="product-card" onclick="navigateTo('product','${p.id}')">
                <div class="product-icon">${p.icon || '📦'}</div>
                <div class="product-title">${p.name}</div>
                <div class="product-price">${p.type === 'simple' ? (p.price || 0).toFixed(2) : (p.base_price || 0).toFixed(2)} €</div>
                <div class="stock-badge">${p.type === 'simple' ? (p.stock === 0 ? 'Rupture' : (p.stock <= 2 ? `Derniers (${p.stock})` : 'En stock')) : 'En stock'}</div>
            </div>`).join('')}</div>`;
        document.getElementById('app').innerHTML = html;
    }

    function renderProductDetail(productId) {
        const product = products.find(p => p.id === productId);
        if (!product) return renderCatalogue();
        const isVariant = product.type === 'variants';
        let selectedVariantId = selectedVariantCache[productId] || null;
        let selectedVariant = null;
        let currentPrice = isVariant ? (product.base_price || 0) : (product.price || 0);
        let currentStock = isVariant ? 0 : (product.stock || 0);
        let canAdd = false;
        if (isVariant && selectedVariantId) {
            selectedVariant = product.variants?.find(v => v.id === selectedVariantId);
            if (selectedVariant) {
                currentPrice = selectedVariant.price;
                currentStock = selectedVariant.stock;
                canAdd = currentStock > 0;
            }
        } else if (!isVariant) canAdd = (product.stock || 0) > 0;
        let tailleOptions = [], couleurOptions = [];
        if (isVariant && product.variants) {
            tailleOptions = [...new Set(product.variants.map(v => v.attributes.taille))];
            couleurOptions = [...new Set(product.variants.map(v => v.attributes.couleur))];
        }
        const currentTaille = selectedVariant?.attributes?.taille || (tailleOptions[0] || '');
        const currentCouleur = selectedVariant?.attributes?.couleur || (couleurOptions[0] || '');
        const html = `<div class="back-link" onclick="navigateTo('catalogue')">← Retour</div>
        <div class="product-detail">
            <div style="font-size:4rem;">${product.icon || '📦'}</div>
            <h2>${product.name}</h2>
            <p>${product.description || ''}</p>
            ${isVariant ? `<div><strong>TAILLE</strong><div class="variant-options" id="tailleContainer">${tailleOptions.map(t => `<div class="variant-btn ${currentTaille === t ? 'selected' : ''}" data-value="${t}">${t}</div>`).join('')}</div></div>
            <div><strong>COULEUR</strong><div class="variant-options" id="couleurContainer">${couleurOptions.map(c => `<div class="variant-btn ${currentCouleur === c ? 'selected' : ''}" data-value="${c}">${c}</div>`).join('')}</div></div>` : ''}
            <div style="font-size:2rem;margin:1rem 0;">${currentPrice.toFixed(2)} €</div>
            <div>${currentStock > 0 ? `✅ En stock (${currentStock})` : '❌ Rupture'}</div>
            <button class="primary" id="addToCartBtn" ${!canAdd ? 'disabled' : ''}>Ajouter au panier</button>
        </div>`;
        document.getElementById('app').innerHTML = html;
        if (isVariant) {
            const tailleBtns = document.querySelectorAll('#tailleContainer .variant-btn');
            const couleurBtns = document.querySelectorAll('#couleurContainer .variant-btn');
            const update = () => {
                const t = document.querySelector('#tailleContainer .variant-btn.selected')?.dataset.value;
                const c = document.querySelector('#couleurContainer .variant-btn.selected')?.dataset.value;
                if (t && c) {
                    const found = product.variants?.find(v => v.attributes.taille === t && v.attributes.couleur === c);
                    if (found) { selectedVariantCache[productId] = found.id; renderProductDetail(productId); }
                    else { selectedVariantCache[productId] = null; renderProductDetail(productId); }
                }
            };
            tailleBtns.forEach(btn => btn.onclick = () => { tailleBtns.forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); update(); });
            couleurBtns.forEach(btn => btn.onclick = () => { couleurBtns.forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); update(); });
        }
        document.getElementById('addToCartBtn')?.addEventListener('click', () => {
            if (isVariant) {
                const vid = selectedVariantCache[productId];
                if (!vid) { showToast('Choisissez une variante'); return; }
                addToCart(productId, vid, 1);
            } else addToCart(productId, null, 1);
        });
    }

    function renderCart() {
        if (cart.length === 0) {
            document.getElementById('app').innerHTML = `<div style="text-align:center;"><h2>Panier vide</h2><button class="outline" onclick="navigateTo('catalogue')">Continuer</button></div>`;
            return;
        }
        const subtotal = getSubtotal();
        const discount = appliedPromo?.discountAmount || 0;
        const total = subtotal - discount;
        const itemsHtml = cart.map((item, idx) => `<div class="cart-item"><div><strong>${item.name}${item.attributes?.taille ? ` (${item.attributes.taille}/${item.attributes.couleur})` : ''}</strong><br>${item.price.toFixed(2)} €</div>
        <div><button class="qty-btn" data-idx="${idx}" data-delta="-1">-</button> <span>${item.quantity}</span> <button class="qty-btn" data-idx="${idx}" data-delta="1">+</button> <button class="qty-btn" data-idx="${idx}" data-delta="-999" style="background:#ef4444;">🗑️</button></div>
        <div>${(item.price * item.quantity).toFixed(2)} €</div></div>`).join('');
        const promoHtml = `<div class="promo-box"><input type="text" id="promoCode" placeholder="Code promo"><button id="applyPromo">Appliquer</button>${appliedPromo ? `<button id="removePromo">Supprimer</button><span>💰 ${appliedPromo.code} : -${discount}€</span>` : ''}</div>`;
        const html = `<div class="cart-page"><div style="display:flex;justify-content:space-between;"><h2>Mon panier</h2><button class="outline" onclick="navigateTo('catalogue')">Continuer</button></div><hr>${itemsHtml}<hr>${promoHtml}<div class="summary"><p>Sous-total : ${subtotal.toFixed(2)} €</p>${appliedPromo ? `<p>Réduction : -${discount.toFixed(2)} €</p>` : ''}<h3>Total : ${total.toFixed(2)} €</h3><button class="primary" id="checkoutBtn">Procéder au paiement</button></div></div>`;
        document.getElementById('app').innerHTML = html;
        document.querySelectorAll('.qty-btn').forEach(btn => {
            btn.onclick = () => {
                const idx = parseInt(btn.dataset.idx);
                const delta = parseInt(btn.dataset.delta);
                if (delta === -999) updateCartItem(idx, 0);
                else updateCartItem(idx, cart[idx].quantity + delta);
            };
        });
        document.getElementById('applyPromo')?.addEventListener('click', () => {
            const code = document.getElementById('promoCode').value.trim().toUpperCase();
            const res = applyPromoCode(code);
            showToast(res.message);
            if (res.success) renderCart();
        });
        document.getElementById('removePromo')?.addEventListener('click', () => { removePromo(); renderCart(); });
        document.getElementById('checkoutBtn')?.addEventListener('click', () => simulateCheckout(total));
    }

    // --- Synchronisation en temps réel (Realtime) ---
    function subscribeToChanges() {
        const channel = supabase.channel('public-changes');
        channel.on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, async () => {
            await loadProducts();
            if (currentPage !== 'cart') renderCurrentPage();
            else renderCart(); // pour rafraîchir les prix si besoin
        }).on('postgres_changes', { event: '*', schema: 'public', table: 'promos' }, async () => {
            await loadPromos();
            if (currentPage === 'cart') renderCart();
        }).subscribe();
    }

    // --- Initialisation ---
    async function init() {
        await loadProducts();
        await loadPromos();
        await loadCart();
        subscribeToChanges();
        renderCurrentPage();
    }
    init();
    window.navigateTo = navigateTo;
</script>
</body>
</html>
