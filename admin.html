<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleShop - Administration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
        }
        body {
            background: #f1f5f9;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 260px;
            background: #0f172a;
            color: #e2e8f0;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .logo h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
        }
        .logo span {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .nav-item {
            padding: 0.7rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .nav-item:hover {
            background: #1e293b;
        }
        .nav-item.active {
            background: #3b82f6;
            color: white;
        }
        .main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-outline {
            background: white;
            border: 1px solid #cbd5e1;
            color: #1e293b;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-small {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.2rem;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
        }
        .stat-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #475569;
            font-weight: 600;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 0.5rem;
        }
        .table-container {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            overflow-x: auto;
            margin-top: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f8fafc;
            font-weight: 600;
        }
        .badge {
            background: #e2e8f0;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge-success {
            background: #dcfce7;
            color: #15803d;
        }
        .badge-warning {
            background: #fef9c3;
            color: #854d0e;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            max-width: 750px;
            width: 90%;
            padding: 1.8rem;
            max-height: 85vh;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            font-weight: 500;
            display: block;
            margin-bottom: 0.4rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
        }
        .product-img-list {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 8px;
            background: #f1f5f9;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .variant-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .variant-row input {
            flex: 1;
            min-width: 100px;
        }
        .image-preview {
            max-width: 100px;
            max-height: 100px;
            margin-top: 8px;
            border-radius: 8px;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 60px));
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .emoji-option {
            font-size: 32px;
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
        }
        .emoji-option:hover {
            background: #e2e8f0;
            transform: scale(1.05);
        }
        .emoji-option.selected {
            border-color: #3b82f6;
            background: #dbeafe;
        }
        .icon-preview {
            font-size: 40px;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo"><h2>StyleShop</h2><span>Admin panel</span></div>
    <div class="nav">
        <div class="nav-item active" data-page="dashboard">📊 Dashboard</div>
        <div class="nav-item" data-page="products">👕 Produits</div>
        <div class="nav-item" data-page="stock">📦 Stock</div>
        <div class="nav-item" data-page="orders">📋 Commandes</div>
        <div class="nav-item" data-page="promos">🏷️ Promos</div>
    </div>
    <div style="margin-top: auto; font-size: 0.7rem;">Accès admin via Supabase Auth (demo)</div>
</div>
<div class="main" id="mainContent"></div>

<script>
    // ---------- Données initiales ----------
    let products = [
        { id: "p1", name: "T-shirt Classic", description: "Coupe confortable", type: "simple", price: 19.9, stock: 12, image: null, icon: "👕", active: true },
        { id: "p2", name: "Sneakers Urban", description: "Tige basse", type: "variants", basePrice: 59.9, variants: [
            { id: "v1", attributes: "38 / Blanc", stock: 5, price: 59.9 },
            { id: "v2", attributes: "39 / Blanc", stock: 3, price: 59.9 },
            { id: "v3", attributes: "40 / Blanc", stock: 0, price: 59.9 },
            { id: "v4", attributes: "38 / Noir", stock: 8, price: 59.9 },
            { id: "v5", attributes: "39 / Noir", stock: 2, price: 59.9 },
            { id: "v6", attributes: "40 / Noir", stock: 4, price: 59.9 }
        ], image: null, icon: "👟" },
        { id: "p3", name: "Hoodie Premium", description: "Molleton épais", type: "variants", basePrice: 79.9, variants: [
            { id: "v7", attributes: "S / Gris", stock: 6, price: 79.9 },
            { id: "v8", attributes: "M / Gris", stock: 10, price: 79.9 },
            { id: "v9", attributes: "L / Gris", stock: 3, price: 79.9 }
        ], image: null, icon: "🧥" },
        { id: "p4", name: "Casquette Logo", description: "Coton bio", type: "simple", price: 24.9, stock: 2, image: null, icon: "🧢", active: true },
        { id: "p5", name: "Chaussettes Pack", description: "Lot x3", type: "simple", price: 12.9, stock: 0, image: null, icon: "🧦", active: true }
    ];

    let orders = [
        { id: "ORD-RYCTHN", client: "marc@mail.com", date: "2026-06-10", time: "14:23", items: [{ productId: "p1", qty: 1, price: 19.9 }], total: 19.9, status: "Payée", adminFollowup: "À traiter", promoCode: null, discount: 0 },
        { id: "ORD-WCP62J", client: "leo@mail.com", date: "2026-06-11", time: "09:15", items: [{ productId: "p2", variantId: "v1", qty: 1, price: 59.9 }], total: 39.8, status: "Payée", adminFollowup: "En cours", promoCode: "PROMO10", discount: 5 },
        { id: "ORD-G7H81J", client: "claire@mail.com", date: "2026-06-12", time: "18:42", items: [{ productId: "p3", variantId: "v7", qty: 1, price: 59.9 }], total: 59.9, status: "En attente", adminFollowup: "À traiter", promoCode: "BIENVENUE", discount: 10 },
        { id: "ORD-D4E5F6", client: "bob@mail.com", date: "2026-06-13", time: "11:05", items: [{ productId: "p4", qty: 1, price: 24.9 }], total: 89.9, status: "Payée", adminFollowup: "Expédié", promoCode: null, discount: 0 },
        { id: "ORD-A1B2C3", client: "alice@mail.com", date: "2026-06-14", time: "20:30", items: [{ productId: "p1", qty: 2, price: 19.9 }, { productId: "p4", qty: 1, price: 24.9 }], total: 69.7, status: "Payée", adminFollowup: "Terminé", promoCode: "BLACKFRIDAY", discount: 15 }
    ];

    let promos = [
        { code: "PROMO10", type: "fixed", value: 5, active: true },
        { code: "BIENVENUE", type: "percent", value: 15, active: true },
        { code: "BLACKFRIDAY", type: "fixed", value: 15, active: true }
    ];

    function loadData() {
        const storedProducts = localStorage.getItem("styleshop_products");
        if(storedProducts) products = JSON.parse(storedProducts);
        const storedOrders = localStorage.getItem("styleshop_orders");
        if(storedOrders) orders = JSON.parse(storedOrders);
        const storedPromos = localStorage.getItem("styleshop_promos");
        if(storedPromos) promos = JSON.parse(storedPromos);
    }
    function saveProducts() { localStorage.setItem("styleshop_products", JSON.stringify(products)); }
    function saveOrders() { localStorage.setItem("styleshop_orders", JSON.stringify(orders)); }
    function savePromos() { localStorage.setItem("styleshop_promos", JSON.stringify(promos)); }
    loadData();

    function getProductById(id) { return products.find(p => p.id === id); }
    
    // Affichage de l'icône (image ou émoji)
    function getProductIcon(product) {
        if(product.image) return `<img class="product-img-list" src="${product.image}">`;
        if(product.icon) return `<div class="product-img-list" style="font-size:28px;">${product.icon}</div>`;
        return `<div class="product-img-list" style="font-size:28px;">📦</div>`;
    }

    // Dashboard 6 cartes
    function getStockStats() {
        let totalStock = 0;
        let ruptures = 0;
        let lowStockItems = 0;
        products.forEach(p => {
            if(p.type === "simple") {
                totalStock += p.stock;
                if(p.stock === 0) ruptures++;
                else if(p.stock <= 2) lowStockItems++;
            } else if(p.variants) {
                p.variants.forEach(v => {
                    totalStock += v.stock;
                    if(v.stock === 0) ruptures++;
                    else if(v.stock <= 2) lowStockItems++;
                });
            }
        });
        return { totalStock, ruptures, lowStockItems };
    }

    function getStats() {
        let totalProducts = products.length;
        let activeProducts = products.filter(p => p.active !== false).length;
        let paidOrders = orders.filter(o => o.status === "Payée");
        let revenue = paidOrders.reduce((sum, o) => sum + o.total, 0);
        return { totalProducts, activeProducts, revenue, ordersCount: orders.length };
    }

    function renderDashboard() {
        const stats = getStats();
        const stockStats = getStockStats();
        const paidOrdersCount = orders.filter(o => o.status === "Payée").length;
        return `
            <div class="page-header"><h1>Dashboard</h1></div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-title">📦 PRODUITS</div><div class="stat-value">${stats.totalProducts}</div><div>${stats.activeProducts} actifs</div></div>
                <div class="stat-card"><div class="stat-title">🛒 COMMANDES</div><div class="stat-value">${stats.ordersCount}</div><div>${paidOrdersCount} payées</div></div>
                <div class="stat-card"><div class="stat-title">💰 CHIFFRE D'AFFAIRES</div><div class="stat-value">${stats.revenue.toFixed(2)} €</div><div>commandes payées</div></div>
                <div class="stat-card"><div class="stat-title">📦 STOCK TOTAL</div><div class="stat-value">${stockStats.totalStock}</div><div>unités</div></div>
                <div class="stat-card"><div class="stat-title">⚠️ STOCK BAS</div><div class="stat-value">${stockStats.lowStockItems}</div><div>articles sous seuil (≤2)</div></div>
                <div class="stat-card"><div class="stat-title">❌ RUPTURES</div><div class="stat-value">${stockStats.ruptures}</div><div>produits/variantes à 0</div></div>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>N° commande</th><th>Client</th><th>Total</th><th>Code promo</th><th>Statut</th><th>Suivi admin</th></tr></thead>
                    <tbody>
                        ${orders.slice(0,5).map(o => `<tr>
                            <td>${o.id}</td>
                            <td>${o.client}</td>
                            <td>${o.total} €</td>
                            <td>${o.promoCode ? `${o.promoCode} (‑${o.discount}€)` : "—"}</td>
                            <td><span class="badge ${o.status === 'Payée' ? 'badge-success' : 'badge-warning'}">${o.status}</span></td>
                            <td><select class="status-admin" data-order-id="${o.id}">${['À traiter','En cours','Expédié','Terminé'].map(s => `<option ${o.adminFollowup === s ? 'selected' : ''}>${s}</option>`).join('')}</select></td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    // Produits (liste)
    function renderProducts() {
        return `
            <div class="page-header"><h1>Produits</h1><button class="btn" id="addProductBtn">+ Ajouter produit</button></div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Icône</th><th>Nom</th><th>Type</th><th>Prix</th><th>Stock</th><th>Actif</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${products.map(p => {
                            let priceDisplay = p.type === "simple" ? `${p.price} €` : `à partir de ${p.basePrice} €`;
                            let stockDisplay = p.type === "simple" ? p.stock : (p.variants?.reduce((s,v)=>s+v.stock,0) || 0);
                            let iconHtml = getProductIcon(p);
                            return `<tr>
                                <td>${iconHtml}</td>
                                <td>${p.name}</td>
                                <td>${p.type === "simple" ? "Simple" : "Variantes"}</td>
                                <td>${priceDisplay}</td>
                                <td>${stockDisplay}</td>
                                <td>${p.active !== false ? "✅" : "❌"}</td>
                                <td><button class="btn-small btn-outline edit-product" data-id="${p.id}">Modifier</button> <button class="btn-small btn-danger delete-product" data-id="${p.id}">Supprimer</button></td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    // Stock avec icône
    function renderStock() {
        let rows = [];
        products.forEach(p => {
            if(p.type === "simple") {
                rows.push({ name: p.name, variant: "Simple", stock: p.stock, productId: p.id, variantId: null, isVariant: false, icon: p.icon, image: p.image });
            } else if(p.variants) {
                p.variants.forEach(v => {
                    rows.push({ name: p.name, variant: v.attributes, stock: v.stock, productId: p.id, variantId: v.id, isVariant: true, icon: p.icon, image: p.image });
                });
            }
        });
        return `
            <div class="page-header"><h1>Gestion du stock</h1></div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Icône</th><th>Produit</th><th>Variante</th><th>Stock actuel</th><th>Ajuster</th></tr></thead>
                    <tbody>
                        ${rows.map(r => {
                            let iconDisplay = r.image ? `<img class="product-img-list" src="${r.image}">` : (r.icon ? `<div class="product-img-list" style="font-size:28px;">${r.icon}</div>` : `<div class="product-img-list" style="font-size:28px;">📦</div>`);
                            return `<tr>
                                <td>${iconDisplay}</td>
                                <td>${r.name}</td>
                                <td>${r.variant}</td>
                                <td>${r.stock === 0 ? "Rupture" : r.stock <= 2 ? `Bas (${r.stock})` : r.stock}</td>
                                <td><button class="btn-small stock-down" data-pid="${r.productId}" data-vid="${r.variantId || ''}" data-isvar="${r.isVariant}">-</button> <span style="margin:0 8px">${r.stock}</span> <button class="btn-small stock-up" data-pid="${r.productId}" data-vid="${r.variantId || ''}" data-isvar="${r.isVariant}">+</button></td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    function updateStock(productId, variantId, delta, isVariant) {
        const product = products.find(p => p.id === productId);
        if(!product) return;
        if(!isVariant && product.type === "simple") {
            product.stock = Math.max(0, (product.stock || 0) + delta);
        } else if(isVariant && product.variants) {
            const variant = product.variants.find(v => v.id === variantId);
            if(variant) variant.stock = Math.max(0, variant.stock + delta);
        }
        saveProducts();
        renderCurrentPage();
    }

    // Détail commande (identique)
    function showOrderDetail(order) {
        const productNames = order.items.map(item => {
            const prod = getProductById(item.productId);
            const name = prod ? prod.name : "Produit";
            const variantInfo = item.variantId && prod?.variants ? prod.variants.find(v => v.id === item.variantId)?.attributes : "";
            return `${name} ${variantInfo ? `(${variantInfo})` : ""} × ${item.qty} = ${(item.price * item.qty).toFixed(2)} €`;
        }).join("<br>");
        const modalHtml = `
            <div class="modal" id="detailModal">
                <div class="modal-content">
                    <h2>Détail commande ${order.id}</h2>
                    <p><strong>Client :</strong> ${order.client}</p>
                    <p><strong>Date :</strong> ${order.date || "non renseignée"} ${order.time ? `à ${order.time}` : ""}</p>
                    <p><strong>Statut :</strong> ${order.status}</p>
                    <p><strong>Suivi admin :</strong> ${order.adminFollowup}</p>
                    <p><strong>Articles :</strong><br>${productNames}</p>
                    <p><strong>Total :</strong> ${order.total} €</p>
                    <p><strong>Code promo :</strong> ${order.promoCode ? `${order.promoCode} (‑${order.discount}€)` : "Aucun"}</p>
                    <div class="flex-between" style="margin-top:1rem;">
                        <button class="btn-outline" id="closeDetailBtn">Fermer</button>
                        <button class="btn" id="applyPromoBtn" data-order-id="${order.id}">💰 Appliquer un code promo</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('detailModal');
        document.getElementById('closeDetailBtn').addEventListener('click', () => modal.remove());
        document.getElementById('applyPromoBtn')?.addEventListener('click', () => {
            modal.remove();
            showApplyPromoToOrder(order.id);
        });
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    }

    function showApplyPromoToOrder(orderId) {
        const order = orders.find(o => o.id === orderId);
        if(!order) return;
        const availablePromos = promos.filter(p => p.active);
        const modalHtml = `
            <div class="modal" id="promoModal">
                <div class="modal-content">
                    <h2>Appliquer un code promo à ${orderId}</h2>
                    <div class="form-group">
                        <label>Choisir un code existant</label>
                        <select id="existingPromo">
                            <option value="">-- Aucun --</option>
                            ${availablePromos.map(p => `<option value="${p.code}">${p.code} (${p.type === 'fixed' ? p.value+'€' : p.value+'%'})</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Ou saisir un nouveau code (montant en € ou %) :</label>
                        <input type="text" id="newPromoCode" placeholder="Code">
                        <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
                            <input type="number" id="promoValue" placeholder="Valeur" step="0.01">
                            <select id="promoType"><option value="fixed">€</option><option value="percent">%</option></select>
                        </div>
                    </div>
                    <div class="flex-between">
                        <button class="btn-outline" id="cancelPromoBtn">Annuler</button>
                        <button class="btn" id="confirmPromoBtn">Appliquer</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('promoModal');
        document.getElementById('cancelPromoBtn').addEventListener('click', () => modal.remove());
        document.getElementById('confirmPromoBtn').addEventListener('click', () => {
            const existingCode = document.getElementById('existingPromo').value;
            let promoCode = existingCode;
            let discount = 0;
            let type = null;
            let value = 0;
            if(existingCode) {
                const promo = promos.find(p => p.code === existingCode);
                if(promo) {
                    type = promo.type;
                    value = promo.value;
                }
            } else {
                const newCode = document.getElementById('newPromoCode').value.trim().toUpperCase();
                const rawValue = parseFloat(document.getElementById('promoValue').value);
                const typeSelect = document.getElementById('promoType').value;
                if(newCode && !isNaN(rawValue) && rawValue > 0) {
                    promoCode = newCode;
                    type = typeSelect;
                    value = rawValue;
                    if(!promos.find(p => p.code === newCode)) {
                        promos.push({ code: newCode, type: type, value: value, active: true });
                        savePromos();
                    }
                }
            }
            if(promoCode && type) {
                const originalTotal = order.items.reduce((sum, item) => sum + (item.price * item.qty), 0);
                let discountAmount = type === 'fixed' ? value : (originalTotal * value / 100);
                discountAmount = Math.min(discountAmount, originalTotal);
                order.discount = parseFloat(discountAmount.toFixed(2));
                order.promoCode = promoCode;
                order.total = parseFloat((originalTotal - discountAmount).toFixed(2));
                saveOrders();
                alert(`Code ${promoCode} appliqué : remise de ${order.discount.toFixed(2)}€`);
                modal.remove();
                renderCurrentPage();
            } else {
                alert("Veuillez sélectionner ou créer un code promo valide");
            }
        });
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    }

    function renderOrders() {
        return `
            <div class="page-header"><h1>Commandes (${orders.length})</h1><button class="btn" id="simulateOrderBtn">+ Simuler commande</button></div>
            <div class="table-container">
                <table>
                    <thead><tr><th>N°</th><th>Client</th><th>Total</th><th>Code promo</th><th>Statut</th><th>Suivi admin</th><th>Détail</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${orders.map(o => `<tr>
                            <td>${o.id}</td>
                            <td>${o.client}</td>
                            <td>${o.total} €</td>
                            <td>${o.promoCode ? `${o.promoCode} (‑${o.discount}€)` : "—"}</td>
                            <td><span class="badge ${o.status === 'Payée' ? 'badge-success' : 'badge-warning'}">${o.status}</span></td>
                            <td><select class="status-admin" data-order-id="${o.id}">${['À traiter','En cours','Expédié','Terminé'].map(s => `<option ${o.adminFollowup === s ? 'selected' : ''}>${s}</option>`).join('')}</select></td>
                            <td><button class="btn-small btn-outline view-detail" data-id="${o.id}">👁️ Voir</button></td>
                            <td><button class="btn-small btn-outline apply-promo" data-id="${o.id}">💰 Promo</button> <button class="btn-small btn-danger delete-order" data-id="${o.id}">Supprimer</button></td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderPromos() {
        return `
            <div class="page-header"><h1>Codes promo</h1><button class="btn" id="addPromoBtn">+ Créer un code</button></div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Code</th><th>Type</th><th>Valeur</th><th>Actif</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${promos.map(p => `<tr>
                            <td>${p.code}</td>
                            <td>${p.type === 'fixed' ? '€ fixe' : '%'}</td>
                            <td>${p.type === 'fixed' ? p.value+'€' : p.value+'%'}</td>
                            <td>${p.active ? "✅" : "❌"}</td>
                            <td><button class="btn-small btn-outline toggle-promo" data-code="${p.code}">Toggle actif</button> <button class="btn-small btn-danger delete-promo" data-code="${p.code}">Supprimer</button></td>
                        </tr>`).join('')}
                    </tbody>
                </tr>
            </div>
        `;
    }

    function showAddPromoModal() {
        const modalHtml = `
            <div class="modal" id="promoModal">
                <div class="modal-content">
                    <h2>Créer un code promo</h2>
                    <div class="form-group"><label>Code</label><input id="promoCode" placeholder="ex: SOLDES20"></div>
                    <div class="form-group"><label>Type</label><select id="promoType"><option value="fixed">Réduction fixe (€)</option><option value="percent">Pourcentage (%)</option></select></div>
                    <div class="form-group"><label>Valeur</label><input id="promoValue" type="number" step="0.01" placeholder="5 ou 15"></div>
                    <div class="flex-between"><button class="btn-outline" id="cancelPromoBtn">Annuler</button><button class="btn" id="savePromoBtn">Enregistrer</button></div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('promoModal');
        document.getElementById('savePromoBtn').addEventListener('click', () => {
            const code = document.getElementById('promoCode').value.trim().toUpperCase();
            const type = document.getElementById('promoType').value;
            const value = parseFloat(document.getElementById('promoValue').value);
            if(!code || isNaN(value) || value <= 0) return alert("Code et valeur valides requis");
            promos.push({ code, type, value, active: true });
            savePromos();
            modal.remove();
            renderCurrentPage();
        });
        document.getElementById('cancelPromoBtn').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    }

    function simulateOrder() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let newId = 'ORD-' + Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
        const randClient = `client${Math.floor(Math.random()*100)}@demo.com`;
        const now = new Date();
        const date = now.toISOString().slice(0,10);
        const time = now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
        let items = [{ productId: "p1", qty: 1, price: 19.9 }];
        let subtotal = 19.9;
        let promoCode = null, discount = 0;
        const activePromos = promos.filter(p => p.active);
        if(activePromos.length > 0 && Math.random() > 0.5) {
            const promo = activePromos[Math.floor(Math.random() * activePromos.length)];
            promoCode = promo.code;
            if(promo.type === 'fixed') discount = Math.min(promo.value, subtotal);
            else discount = subtotal * promo.value / 100;
            discount = parseFloat(discount.toFixed(2));
        }
        const newOrder = {
            id: newId, client: randClient, date: date, time: time,
            items: items, total: parseFloat((subtotal - discount).toFixed(2)),
            status: Math.random() > 0.6 ? "Payée" : "En attente",
            adminFollowup: "À traiter", promoCode: promoCode, discount: discount
        };
        orders.unshift(newOrder);
        saveOrders();
        renderCurrentPage();
    }

    // ---------- MODAL PRODUIT AVEC ÉMOJIS ----------
    const emojiList = ["👕", "👖", "👟", "🧥", "🧢", "🧦", "🧤", "🕶️", "👗", "👚", "🎒", "👔", "💼", "👠", "👡", "🩳", "🧣", "🧦", "👑", "📿"];

    function showProductModal(product = null) {
        const isEdit = !!product;
        let variantsArray = product?.variants ? [...product.variants] : [];
        let selectedEmoji = product?.icon || "📦";
        
        const modalHtml = `
            <div class="modal" id="productModal">
                <div class="modal-content">
                    <h2>${isEdit ? "Modifier" : "Ajouter"} un produit</h2>
                    <div class="form-group"><label>Nom</label><input id="prodName" value="${product?.name || ''}"></div>
                    <div class="form-group"><label>Description</label><textarea id="prodDesc">${product?.description || ''}</textarea></div>
                    <div class="form-group"><label>Type</label><select id="prodType">
                        <option value="simple" ${product?.type === 'simple' ? 'selected' : ''}>Produit simple</option>
                        <option value="variants" ${product?.type === 'variants' ? 'selected' : ''}>Avec variantes</option>
                    </select></div>
                    
                    <div id="simpleFields" style="${product?.type === 'variants' ? 'display:none' : 'display:block'}">
                        <div class="form-group"><label>Prix (€)</label><input id="simplePrice" type="number" step="0.01" value="${product?.price || ''}"></div>
                        <div class="form-group"><label>Stock</label><input id="simpleStock" type="number" value="${product?.stock || 0}"></div>
                    </div>
                    
                    <div id="variantsFields" style="${product?.type === 'variants' ? 'display:block' : 'display:none'}">
                        <div class="form-group"><label>Prix de base (€)</label><input id="basePrice" type="number" step="0.01" value="${product?.basePrice || ''}"></div>
                        <div class="form-group"><label>Variantes</label>
                            <div id="variantsContainer"></div>
                            <button type="button" class="btn-small" id="addVariantBtn" style="margin-top:0.5rem;">+ Ajouter une variante</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Icône / Image</label>
                        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                            <label><input type="radio" name="iconType" value="emoji" ${!product?.image ? 'checked' : ''}> Choisir un émoji</label>
                            <label><input type="radio" name="iconType" value="upload" ${product?.image ? 'checked' : ''}> Télécharger une image (PNG/JPG)</label>
                            <label><input type="radio" name="iconType" value="none" ${(!product?.image && !product?.icon) ? 'checked' : ''}> Pas d'icône</label>
                        </div>
                        <div id="emojiSelector" style="margin-top: 10px;">
                            <div class="emoji-grid" id="emojiGrid"></div>
                            <div class="form-group" style="margin-top: 10px;"><label>Ou saisis ton émoji :</label><input type="text" id="customEmoji" placeholder="ex: 🚀" maxlength="2" style="width: 80px;"></div>
                            <div>Aperçu : <span id="emojiPreview" class="icon-preview">${selectedEmoji}</span></div>
                        </div>
                        <div id="uploadArea" style="display:${product?.image ? 'block' : 'none'}; margin-top:0.5rem;">
                            <input type="file" id="imageUpload" accept="image/png,image/jpeg">
                            <br>
                            <img id="previewImg" src="${product?.image || ''}" class="image-preview" style="display:${product?.image ? 'block' : 'none'}">
                        </div>
                    </div>
                    
                    <div class="form-group"><label><input type="checkbox" id="activeCheck" ${product?.active !== false ? 'checked' : ''}> Produit actif</label></div>
                    
                    <div class="flex-between">
                        <button class="btn-outline" id="closeModalBtn">Annuler</button>
                        <button class="btn" id="saveProductBtn">Enregistrer</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('productModal');
        
        // Remplir la grille d'émojis
        const emojiGrid = document.getElementById('emojiGrid');
        emojiList.forEach(emoji => {
            const div = document.createElement('div');
            div.className = 'emoji-option';
            if(emoji === selectedEmoji) div.classList.add('selected');
            div.textContent = emoji;
            div.addEventListener('click', () => {
                document.querySelectorAll('.emoji-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                document.getElementById('customEmoji').value = '';
                document.getElementById('emojiPreview').textContent = emoji;
                selectedEmoji = emoji;
            });
            emojiGrid.appendChild(div);
        });
        
        // Gestion des radios
        const radioEmoji = document.querySelector('input[name="iconType"][value="emoji"]');
        const radioUpload = document.querySelector('input[name="iconType"][value="upload"]');
        const radioNone = document.querySelector('input[name="iconType"][value="none"]');
        const emojiSelectorDiv = document.getElementById('emojiSelector');
        const uploadAreaDiv = document.getElementById('uploadArea');
        const customEmojiInput = document.getElementById('customEmoji');
        const emojiPreviewSpan = document.getElementById('emojiPreview');
        
        function toggleIconFields() {
            if(radioEmoji.checked) {
                emojiSelectorDiv.style.display = 'block';
                uploadAreaDiv.style.display = 'none';
            } else if(radioUpload.checked) {
                emojiSelectorDiv.style.display = 'none';
                uploadAreaDiv.style.display = 'block';
            } else {
                emojiSelectorDiv.style.display = 'none';
                uploadAreaDiv.style.display = 'none';
            }
        }
        radioEmoji.addEventListener('change', toggleIconFields);
        radioUpload.addEventListener('change', toggleIconFields);
        radioNone.addEventListener('change', toggleIconFields);
        toggleIconFields();
        
        customEmojiInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            if(val) {
                // Désélectionner les émojis de la grille
                document.querySelectorAll('.emoji-option').forEach(el => el.classList.remove('selected'));
                emojiPreviewSpan.textContent = val;
                selectedEmoji = val;
            } else if(radioEmoji.checked) {
                // Si vide, reprendre le premier sélectionné ou par défaut
                const firstSelected = document.querySelector('.emoji-option.selected');
                if(firstSelected) {
                    emojiPreviewSpan.textContent = firstSelected.textContent;
                    selectedEmoji = firstSelected.textContent;
                } else {
                    emojiPreviewSpan.textContent = "📦";
                    selectedEmoji = "📦";
                }
            }
        });
        
        // Gestion upload image
        const fileInput = document.getElementById('imageUpload');
        const previewImg = document.getElementById('previewImg');
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file && (file.type === 'image/png' || file.type === 'image/jpeg')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImg.src = ev.target.result;
                    previewImg.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                alert("Seulement PNG ou JPG");
                fileInput.value = '';
            }
        });
        
        // Gestion des variantes
        const typeSelect = document.getElementById('prodType');
        const simpleDiv = document.getElementById('simpleFields');
        const variantsDiv = document.getElementById('variantsFields');
        
        function toggleFields() {
            const isVariants = typeSelect.value === 'variants';
            simpleDiv.style.display = isVariants ? 'none' : 'block';
            variantsDiv.style.display = isVariants ? 'block' : 'none';
        }
        typeSelect.addEventListener('change', toggleFields);
        
        function renderVariants() {
            const container = document.getElementById('variantsContainer');
            if(!container) return;
            container.innerHTML = '';
            variantsArray.forEach((v, idx) => {
                const div = document.createElement('div');
                div.className = 'variant-row';
                div.innerHTML = `
                    <input type="text" placeholder="Taille / Couleur" value="${escapeHtml(v.attributes || '')}" data-field="attrs${idx}">
                    <input type="number" placeholder="Stock" value="${v.stock || 0}" style="width:90px" data-field="stock${idx}">
                    <input type="number" placeholder="Prix €" step="0.01" value="${v.price || ''}" style="width:100px" data-field="price${idx}">
                    <button type="button" class="btn-small btn-danger" data-idx="${idx}">✖</button>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('#variantsContainer .btn-danger').forEach(btn => {
                btn.removeEventListener('click', handleVariantDelete);
                btn.addEventListener('click', handleVariantDelete);
            });
        }
        function handleVariantDelete(e) {
            const idx = parseInt(e.currentTarget.dataset.idx);
            variantsArray.splice(idx, 1);
            renderVariants();
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }
        
        const addVariantBtn = document.getElementById('addVariantBtn');
        if(addVariantBtn) {
            addVariantBtn.addEventListener('click', () => {
                variantsArray.push({ attributes: "", stock: 0, price: 0 });
                renderVariants();
            });
        }
        if(product?.type === 'variants') renderVariants();
        
        // Sauvegarde
        document.getElementById('saveProductBtn').addEventListener('click', () => {
            const name = document.getElementById('prodName').value.trim();
            if(!name) return alert("Nom requis");
            const description = document.getElementById('prodDesc').value;
            const active = document.getElementById('activeCheck').checked;
            
            let icon = null;
            let image = null;
            if(radioEmoji.checked) {
                icon = document.getElementById('emojiPreview').textContent;
                image = null;
            } else if(radioUpload.checked && fileInput.files.length > 0 && previewImg.src && previewImg.src.startsWith('data:')) {
                image = previewImg.src;
                icon = null;
            } else if(radioUpload.checked && product?.image && !fileInput.files.length) {
                image = product.image;
                icon = null;
            } else {
                icon = null;
                image = null;
            }
            
            const type = typeSelect.value;
            if(type === 'simple') {
                const price = parseFloat(document.getElementById('simplePrice').value);
                const stock = parseInt(document.getElementById('simpleStock').value);
                if(isNaN(price)) return alert("Prix invalide");
                const newProduct = {
                    id: isEdit ? product.id : Date.now().toString(),
                    name, description, type: "simple",
                    price, stock, image, icon, active
                };
                if(isEdit) {
                    const idx = products.findIndex(p => p.id === product.id);
                    if(idx !== -1) products[idx] = newProduct;
                } else products.push(newProduct);
            } else {
                const basePrice = parseFloat(document.getElementById('basePrice').value);
                if(isNaN(basePrice)) return alert("Prix de base requis");
                const finalVariants = [];
                const rows = document.querySelectorAll('#variantsContainer .variant-row');
                for(let i=0; i<rows.length; i++) {
                    const row = rows[i];
                    const attrsInput = row.querySelector(`input[data-field="attrs${i}"]`);
                    const stockInput = row.querySelector(`input[data-field="stock${i}"]`);
                    const priceInput = row.querySelector(`input[data-field="price${i}"]`);
                    const attributes = attrsInput ? attrsInput.value.trim() : '';
                    if(!attributes) continue;
                    const stock = parseInt(stockInput ? stockInput.value : 0) || 0;
                    const priceVar = parseFloat(priceInput ? priceInput.value : 0) || basePrice;
                    finalVariants.push({
                        id: Date.now() + i + Math.random(),
                        attributes: attributes,
                        stock: stock,
                        price: priceVar
                    });
                }
                if(finalVariants.length === 0) return alert("Ajoutez au moins une variante");
                const newProduct = {
                    id: isEdit ? product.id : Date.now().toString(),
                    name, description, type: "variants",
                    basePrice: basePrice,
                    variants: finalVariants,
                    image, icon, active
                };
                if(isEdit) {
                    const idx = products.findIndex(p => p.id === product.id);
                    if(idx !== -1) products[idx] = newProduct;
                } else products.push(newProduct);
            }
            saveProducts();
            modal.remove();
            renderCurrentPage();
        });
        
        document.getElementById('closeModalBtn').addEventListener('click', () => modal.remove());
        modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    }
    
    // Événements globaux
    function attachGlobalEvents() {
        document.querySelectorAll('.status-admin').forEach(sel => {
            sel.removeEventListener('change', handleAdminChange);
            sel.addEventListener('change', handleAdminChange);
        });
        document.querySelectorAll('.stock-up, .stock-down').forEach(btn => {
            btn.removeEventListener('click', handleStockClick);
            btn.addEventListener('click', handleStockClick);
        });
        document.querySelectorAll('.delete-product').forEach(btn => {
            btn.removeEventListener('click', handleDeleteProduct);
            btn.addEventListener('click', handleDeleteProduct);
        });
        document.querySelectorAll('.edit-product').forEach(btn => {
            btn.removeEventListener('click', handleEditProduct);
            btn.addEventListener('click', handleEditProduct);
        });
        document.querySelectorAll('.delete-order').forEach(btn => {
            btn.removeEventListener('click', handleDeleteOrder);
            btn.addEventListener('click', handleDeleteOrder);
        });
        document.querySelectorAll('.view-detail').forEach(btn => {
            btn.removeEventListener('click', handleViewDetail);
            btn.addEventListener('click', handleViewDetail);
        });
        document.querySelectorAll('.apply-promo').forEach(btn => {
            btn.removeEventListener('click', handleApplyPromo);
            btn.addEventListener('click', handleApplyPromo);
        });
        document.querySelectorAll('.toggle-promo').forEach(btn => {
            btn.removeEventListener('click', handleTogglePromo);
            btn.addEventListener('click', handleTogglePromo);
        });
        document.querySelectorAll('.delete-promo').forEach(btn => {
            btn.removeEventListener('click', handleDeletePromo);
            btn.addEventListener('click', handleDeletePromo);
        });
    }
    
    function handleAdminChange(e) {
        const order = orders.find(o => o.id === e.target.dataset.orderId);
        if(order) { order.adminFollowup = e.target.value; saveOrders(); }
    }
    function handleStockClick(e) {
        const btn = e.currentTarget;
        const delta = btn.classList.contains('stock-up') ? 1 : -1;
        updateStock(btn.dataset.pid, btn.dataset.vid, delta, btn.dataset.isvar === 'true');
    }
    function handleDeleteProduct(e) {
        if(confirm("Supprimer ce produit ?")) {
            products = products.filter(p => p.id !== e.currentTarget.dataset.id);
            saveProducts();
            renderCurrentPage();
        }
    }
    function handleEditProduct(e) {
        const product = products.find(p => p.id === e.currentTarget.dataset.id);
        if(product) showProductModal(product);
    }
    function handleDeleteOrder(e) {
        if(confirm("Supprimer cette commande ?")) {
            orders = orders.filter(o => o.id !== e.currentTarget.dataset.id);
            saveOrders();
            renderCurrentPage();
        }
    }
    function handleViewDetail(e) {
        const order = orders.find(o => o.id === e.currentTarget.dataset.id);
        if(order) showOrderDetail(order);
    }
    function handleApplyPromo(e) {
        const orderId = e.currentTarget.dataset.id;
        showApplyPromoToOrder(orderId);
    }
    function handleTogglePromo(e) {
        const promo = promos.find(p => p.code === e.currentTarget.dataset.code);
        if(promo) { promo.active = !promo.active; savePromos(); renderCurrentPage(); }
    }
    function handleDeletePromo(e) {
        if(confirm("Supprimer ce code promo ?")) {
            promos = promos.filter(p => p.code !== e.currentTarget.dataset.code);
            savePromos();
            renderCurrentPage();
        }
    }
    
    let currentPage = 'dashboard';
    function renderCurrentPage() {
        let html = '';
        if(currentPage === 'dashboard') html = renderDashboard();
        else if(currentPage === 'products') html = renderProducts();
        else if(currentPage === 'stock') html = renderStock();
        else if(currentPage === 'orders') html = renderOrders();
        else if(currentPage === 'promos') html = renderPromos();
        document.getElementById('mainContent').innerHTML = html;
        if(currentPage === 'products') {
            const addBtn = document.getElementById('addProductBtn');
            if(addBtn) addBtn.addEventListener('click', () => showProductModal(null));
        }
        if(currentPage === 'orders') {
            const simBtn = document.getElementById('simulateOrderBtn');
            if(simBtn) simBtn.addEventListener('click', simulateOrder);
        }
        if(currentPage === 'promos') {
            const addPromoBtn = document.getElementById('addPromoBtn');
            if(addPromoBtn) addPromoBtn.addEventListener('click', showAddPromoModal);
        }
        attachGlobalEvents();
    }
    
    function initNavigation() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                currentPage = item.dataset.page;
                renderCurrentPage();
            });
        });
        renderCurrentPage();
    }
    initNavigation();
</script>
</body>
</html>
