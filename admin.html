
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleShop - Administration</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
body { background: #f1f5f9; display: flex; min-height: 100vh; }

.sidebar { width: 260px; background: #0f172a; color: #e2e8f0; padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 2rem; position: sticky; top: 0; height: 100vh; }

.logo h2 { font-size: 1.6rem; color: white; }
.logo span { font-size: 0.8rem; color: #94a3b8; }

.nav-item { padding: 0.7rem 1rem; border-radius: 12px; cursor: pointer; transition: 0.2s; font-weight: 500; }
.nav-item:hover { background: #1e293b; }
.nav-item.active { background: #3b82f6; color: white; }

.main { flex: 1; padding: 2rem; overflow-y: auto; }

.table-container { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow-x: auto; margin-top: 1rem; }
table { width: 100%; border-collapse: collapse; }

th, td { text-align: left; padding: 0.75rem 1rem; border-bottom: 1px solid #e2e8f0; }
th { background: #f8fafc; }

.badge { padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.75rem; }
.badge-success { background: #dcfce7; color: #15803d; }
.badge-warning { background: #fef9c3; color: #854d0e; }
.badge-danger { background: #fee2e2; color: #dc2626; }

.product-img-list img {
width: 40px;
height: 40px;
object-fit: cover;
border-radius: 8px;
}

.toast {
position: fixed;
bottom: 20px;
right: 20px;
background: #0f172a;
color: white;
padding: 0.8rem 1.5rem;
border-radius: 40px;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">
        <h2>StyleShop</h2>
        <span>Admin panel</span>
    </div>

    <div class="nav">
        <div class="nav-item active" data-page="dashboard">📊 Dashboard</div>
        <div class="nav-item" data-page="products">👕 Produits</div>
        <div class="nav-item" data-page="stock">📦 Stock</div>
        <div class="nav-item" data-page="orders">📋 Commandes</div>
        <div class="nav-item" data-page="promos">🏷️ Promos</div>
    </div>
</div>

<div class="main" id="mainContent">
    <div style="text-align:center;padding:3rem;">Chargement...</div>
</div>

<script>
// =========================
// CONFIG SUPABASE
// =========================
const SUPABASE_URL = 'https://xrocqhazpmjcnqjdyytd.supabase.co';
const SUPABASE_KEY = 'YOUR_KEY_HERE';

// =========================
function isValidUrl(url) {
    return typeof url === 'string' &&
        (url.startsWith('http://') || url.startsWith('https://'));
}

// =========================
async function fetchSupabase(endpoint, options = {}) {
    const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
    };

    const res = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
        ...options,
        headers
    });

    if (!res.ok) {
        console.error(await res.text());
        return null;
    }

    return await res.json();
}

// =========================
let products = [];
let orders = [];
let promos = [];

// =========================
// LOAD PRODUCTS FIXÉ
// =========================
async function loadProducts() {
    const data = await fetchSupabase('products?select=*');

    if (!Array.isArray(data)) return [];

    data.forEach(p => {

        if (!Array.isArray(p.images)) p.images = [];

        if (isValidUrl(p.image_url)) {
            if (!p.images.includes(p.image_url)) {
                p.images.unshift(p.image_url);
            }
        }

        if (p.images.length === 0) {
            p.images = ['https://via.placeholder.com/80?text=No+Image'];
        }

        if (p.type === 'simple') {
            p.stock = parseInt(p.stock) || 0;
        }

        if (Array.isArray(p.variants)) {
            p.variants.forEach(v => {
                v.stock = parseInt(v.stock) || 0;
            });
        }
    });

    products = data;
}

// =========================
// IMAGE DISPLAY FIXÉ
// =========================
function getDisplayIcon(p) {
    const img = p.images?.[0] || p.image_url;

    if (isValidUrl(img)) {
        return `<img src="${img}" onerror="this.src='https://via.placeholder.com/40'" />`;
    }

    return '📦';
}

// =========================
// DASHBOARD SIMPLE
// =========================
async function renderDashboard() {
    await loadProducts();

    document.getElementById('mainContent').innerHTML = `
        <h1>Dashboard</h1>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Image</th><th>Nom</th><th>Stock</th></tr>
                </thead>
                <tbody>
                    ${products.map(p => `
                        <tr>
                            <td class="product-img-list">${getDisplayIcon(p)}</td>
                            <td>${p.name}</td>
                            <td>${p.stock || 0}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

// =========================
// NAV
// =========================
document.querySelectorAll('.nav-item').forEach(el => {
    el.onclick = () => renderDashboard();
});

// =========================
// INIT
// =========================
renderDashboard();

</script>

</body>
</html>
